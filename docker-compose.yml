services:
  db:
    container_name: pathfinder-db
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pathfinder
      MYSQL_DATABASE: pathfinder
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppathfinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: pathfinder-api
    build:
      context: .
      dockerfile: api_py/Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  mysqldata:
